name: Update OKF knowledge bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      OKFGEN_PROVIDER: openrouter
      OKFGEN_MODEL: openai/gpt-oss-120b
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --global okfgen@0.0.3
      - name: Refresh knowledge
        run: okfgen update "Refresh this repository knowledge" --source ./src ./README.md --output ./knowledge
      - name: Validate bundle
        run: okfgen validate ./knowledge
      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: refresh OKF knowledge bundle"
          title: "docs: refresh OKF knowledge bundle"
          body: "Automated OKFgen knowledge refresh."
          branch: automated/okfgen-update
